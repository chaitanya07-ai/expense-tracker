<!DOCTYPE html>
<html>
<head>
  <title>Expense Tracker</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="container">

  <h1>💰 Expense Tracker</h1>
  <p class="sub">Track your income and expenses easily</p>

  <!-- form -->
  <form action="/add" method="POST">
    <input type="text" name="title" placeholder="Title" required>
    <input type="number" name="amount" placeholder="Amount" required>

    <select name="type">
      <option value="income">Income</option>
      <option value="expense">Expense</option>
    </select>

    <input type="text" name="category" placeholder="Category">
    <input type="date" name="date">

    <button type="submit">Add</button>
  </form>

  <!-- summary -->
  <div class="summary">
    <div class="card income">Income ₹<span id="income">0</span></div>
    <div class="card expense">Expense ₹<span id="expense">0</span></div>
    <div class="card">Balance ₹<span id="balance">0</span></div>
  </div>

  <!-- charts -->
  <div class="charts">
    <canvas id="pieChart"></canvas>
    <canvas id="barChart"></canvas>
  </div>

  <div class="timeline">
    <h2>📌 Recent Activity</h2>
    <div id="timeline"></div>
  </div>

  <!-- search -->
  <input type="text" id="search" placeholder="Search..." onkeyup="searchData()">

  <!-- list -->
  <div class="list">
    <ul id="list"></ul>
  </div>

</div>

<script src="/js/script.js"></script>

</body>
</html>
